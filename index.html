<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>AI Workspace IDE</title>
  <meta http-equiv="Content-Security-Policy" content="default-src 'self'; style-src 'self' 'unsafe-inline'; script-src 'self'">
  <link rel="stylesheet" href="./node_modules/xterm/css/xterm.css" />
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div id="app">
    <aside id="left-panel">
      <div class="panel-header">
        <span class="panel-title">Memory</span>
      </div>
      <div id="memory-list"></div>
      <div id="memory-viewer" class="hidden">
        <div class="viewer-header">
          <span id="viewer-filename"></span>
          <button id="close-viewer" class="icon-btn">✕</button>
        </div>
        <pre id="viewer-content"></pre>
      </div>
    </aside>
    <div id="panel-resize-handle"></div>
    <main id="terminal-workspace">
      <div class="workspace-topbar">
        <div class="topbar-left">
          <button id="toggle-panel-btn" class="icon-btn" title="Toggle panel">
            <svg viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="currentColor" stroke-width="2">
              <rect x="3" y="3" width="18" height="18" rx="2" ry="2"/>
              <line x1="9" y1="3" x2="9" y2="21"/>
            </svg>
          </button>
          <span class="workspace-title">Terminal</span>
          <span id="current-dir" class="current-dir"></span>
        </div>
        <div class="topbar-actions">
          <span id="terminal-count" class="terminal-count"></span>
          <button id="add-terminal-btn" class="btn-primary">
            <svg viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="currentColor" stroke-width="2">
              <path d="M12 5v14m-7-7h14"/>
            </svg>
            New Terminal
          </button>
        </div>
      </div>
      <div id="terminal-grid"></div>
    </main>
  </div>

  <script src="renderer.js"></script>
</body>
</html>
